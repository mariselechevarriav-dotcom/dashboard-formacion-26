  const wkT=active.filter(t=>t.due&&t.due>=mon.getTime()&&t.due<=sun.getTime());
  const urg=active.filter(t=>t.priority==="urgent");
  const ovd=active.filter(t=>t.due&&t.due<now);
  const esp=active.filter(t=>t.status==="esperando respuesta");
  const sinDef=active.filter(t=>t.status==="por definir"||!t.ass||t.ass.length===0||!t.due||t.status==="planificado");
  const mLoad=active.filter(t=>t.ass&&t.ass.includes(MARIA)).length;
  const sLoad=active.filter(t=>t.ass&&t.ass.includes(MARISEL)).length;
  const nwMon=new Date(mon);nwMon.setDate(mon.getDate()+7);
  const nwSun=new Date(nwMon);nwSun.setDate(nwMon.getDate()+6);nwSun.setHours(23,59,59,999);
  const nwT=active.filter(t=>t.due&&t.due>=nwMon.getTime()&&t.due<=nwSun.getTime());
  function sameDay(ts,d){const td=new Date(ts);return td.getDate()===d.getDate()&&td.getMonth()===d.getMonth()&&td.getFullYear()===d.getFullYear();}
  function pCard(label,init,av,id){
    const pt=active.filter(t=>t.ass&&t.ass.includes(id));
    const bt={};pt.forEach(t=>{const tp=getType(t);bt[tp]=(bt[tp]||0)+1;});
    const tot=pt.length||1;
    const bars=["estratégico","operativo","coordinación","seguimiento","análisis","gestión"].filter(tp=>bt[tp]);
    return`<div class="card"><div class="phead"><div class="av ${av}">${init}</div><div><div class="pname">${label}</div></div></div>
    <div class="pstats"><div><div class="psv">${pt.length}</div><div class="psl">activas</div></div>${bars.slice(0,3).map(tp=>`<div><div class="psv">${bt[tp]}</div><div class="psl">${tp}</div></div>`).join("")}</div>
    <div class="sbar">${bars.map(tp=>`<div style="width:${Math.round((bt[tp]||0)/tot*100)}%;background:${TYPE_COLORS[tp]||'#555'}"></div>`).join("")}</div>
    <div class="bleg">${bars.map(tp=>`<span class="bli"><span class="bldot" style="background:${TYPE_COLORS[tp]||'#555'}"></span>${tp} ${bt[tp]}</span>`).join("")}</div></div>`;
  }
  let v1f="all";
  function renderV1tasks(){
    const cats=["all","Maria","Marisel","urgente","esperando respuesta","estratégico","operativo"];
    document.getElementById("v1f").innerHTML=cats.map(f=>`<button class="fbtn${f===v1f?" active":""}" onclick="v1sf('${f}')">${f==="all"?"Todas":f}</button>`).join("");
    let list=active;
    if(v1f==="Maria")list=list.filter(t=>t.ass&&t.ass.includes(MARIA));
    else if(v1f==="Marisel")list=list.filter(t=>t.ass&&t.ass.includes(MARISEL));
    else if(v1f==="urgente")list=list.filter(t=>t.priority==="urgent");
    else if(v1f==="esperando respuesta")list=list.filter(t=>t.status==="esperando respuesta");
    else if(v1f==="estratégico")list=list.filter(t=>getType(t)==="estratégico");
    else if(v1f==="operativo")list=list.filter(t=>getType(t)==="operativo");
    list=list.sort((a,b)=>(a.due||9e15)-(b.due||9e15));
    document.getElementById("v1tasks").innerHTML=list.map(t=>{
      const isOv=t.due&&t.due<now;
      const both=t.ass&&t.ass.includes(MARIA)&&t.ass.includes(MARISEL);
      const dc=both?"#7a4e00":t.ass&&t.ass.includes(MARISEL)?"#1e1060":"#1a5c3a";
      return`<div class="trow">${sdot(t.status)}<span class="pdot" style="background:${dc}"></span><span class="tname"><a href="https://app.clickup.com/t/${t.id}" target="_blank">${t.name}</a></span>${tbadge(getType(t))}${pbadge(t.priority)}<span class="${isOv?"due-ov":"due-ok"}">${fmtD(t.due)}${isOv?" ⚠":""}</span></div>`;
    }).join("")||`<div style="font-size:11px;color:#5a5048;padding:.5rem">Sin tareas para este filtro.</div>`;
  }
  window.v1sf=f=>{v1f=f;renderV1tasks();};
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  const dnames=["LUN","MAR","MIÉ","JUE","VIE","SÁB","DOM"];
  document.getElementById("v1").innerHTML=`
  <div class="section"><div class="sec-title">Gestión Semanal Operativa</div>
    <div class="grid4">${[{l:"Tareas activas semana",v:wkT.length,s:"con fecha esta semana"},{l:"Maria activas",v:mLoad,s:"total asignadas",c:"#0d6e3a"},{l:"Marisel activas",v:sLoad,s:"total asignadas",c:"#1e1060"},{l:"Urgentes activas",v:urg.length,s:"atención inmediata",c:"#8b1a1a"}].map(m=>`<div class="card"><div class="metric-lbl">${m.l}</div><div class="metric-val"${m.c?` style="color:${m.c}"`:""}>${m.v}</div><div class="metric-sub">${m.s}</div></div>`).join("")}</div>
    <div class="grid4" style="margin-top:8px">${[{l:"Vencidas",v:ovd.length,s:"superaron fecha",c:"#8b3a00"},{l:"Esperando respuesta",v:esp.length,s:"dependen de terceros",c:"#1a3a6b"},{l:"Sin definir",v:sinDef.length,s:"sin responsable / fecha / inicio",c:"#4a2e6b"},{l:"En desarrollo",v:active.filter(t=>t.status==="en desarrollo").length,s:"actualmente activas",c:"#0d4226"}].map(m=>`<div class="card"><div class="metric-lbl">${m.l}</div><div class="metric-val"${m.c?` style="color:${m.c}"`:""}>${m.v}</div><div class="metric-sub">${m.s}</div></div>`).join("")}</div>
  </div>
  <div class="section"><div class="sec-title">Carga esta semana por persona</div><div class="grid2">${pCard("Maria Merino","MM","av-m",MARIA)}${pCard("Marisel Echevarría","ME","av-s",MARISEL)}</div></div>
  <div class="section"><div class="sec-title">Calendario de la semana</div>
    <div class="cal-leg"><span><span class="ldot" style="background:#1a5c3a"></span>Maria</span><span><span class="ldot" style="background:#1e1060"></span>Marisel</span><span><span class="ldot" style="background:#7a4e00"></span>Compartida</span></div>
    <div class="cal-grid">${days.map((day,i)=>{const isT=sameDay(now,day);const dt=active.filter(t=>t.due&&sameDay(t.due,day));const th=dt.slice(0,4).map(t=>{const both=t.ass&&t.ass.includes(MARIA)&&t.ass.includes(MARISEL);const cls=both?"ct-sh":t.ass&&t.ass.includes(MARISEL)?"ct-s":"ct-m";const sn=t.name.length>26?t.name.slice(0,24)+"…":t.name;return`<div class="ct ${cls}" title="${t.name}">${sn}</div>`;}).join("")+(dt.length>4?`<div style="font-size:9px;color:#5a5048">+${dt.length-4}</div>`:"");return`<div class="cal-day${isT?" today":""}"><div class="cal-dh">${dnames[i]}</div><div class="cal-dn">${day.getDate()}</div>${th||'<div style="font-size:9px;color:#8a7d6e">—</div>'}</div>`;}).join("")}</div>
  </div>
  <div class="section"><div class="sec-title">Tareas activas — todas</div><div class="card"><div class="frow" id="v1f"></div><div id="v1tasks"></div></div></div>
  <div class="section"><div class="sec-title">Próxima semana — atención anticipada</div>
    <div class="card"><div class="nwt">⚡ Tareas que vencen la próxima semana (${nwT.length}) — actúa ahora</div>
    ${nwT.sort((a,b)=>(a.due||0)-(b.due||0)).map(t=>{const isEsp=t.status==="esperando respuesta";const dc=t.ass&&t.ass.includes(MARISEL)&&!(t.ass&&t.ass.includes(MARIA))?"#1e1060":"#1a5c3a";return`<div class="trow">${sdot(t.status)}<span class="pdot" style="background:${dc}"></span><span class="tname">${t.name}</span>${pbadge(t.priority)}${isEsp?`<span class="blk">⏳ esperando</span>`:""}<span class="due-ok">${fmtD(t.due)}</span></div>`;}).join("")||'<div style="font-size:11px;color:#5a5048">Sin tareas la próxima semana.</div>'}
    ${esp.length>0?`<div style="margin-top:10px;font-size:10px;font-weight:700;color:#7a4e00">🔒 ${esp.length} tareas bloqueadas por respuesta de terceros</div>`:""}</div>
  </div>
  <div class="section"><div class="sec-title">Insights semanales</div><div class="ins-list">${[
    {c:"ins-r",t:`<strong>${ovd.length} tareas con fecha vencida</strong> — PDL y CHASKA concentran la mayor parte. Requieren acción inmediata o reprogramación.`},
    {c:"ins-y",t:`<strong>${esp.length} tareas bloqueadas esperando respuesta</strong> — Cable Bolting (Nexa), PDL (proveedor). Pueden trabar la semana siguiente si no se activan hoy.`},
    {c:"ins-b",t:`<strong>Distribución asimétrica de carga</strong> — Maria tiene más tareas (${mLoad}) de ejecución rápida. Marisel menos tareas (${sLoad}) pero de mayor carga cognitiva.`},
    {c:"ins-g",t:`<strong>Próxima semana: ${nwT.length} tareas vencen</strong> — Revisar PDL, FL y CHASKA para no llegar tarde.`},
  ].map(i=>`<div class="ins ${i.c}">${i.t}</div>`).join("")}</div></div>`;
  renderV1tasks();
}

function buildV2(tasks){
  const now=Date.now();
  const active=tasks.filter(t=>!CLOSED_ST.includes(t.status));
  const strat=active.filter(t=>getType(t)==="estratégico");
  const sm=strat.filter(t=>t.ass&&t.ass.includes(MARIA));
  const ss=strat.filter(t=>t.ass&&t.ass.includes(MARISEL));
  const sBlk=strat.filter(t=>t.status==="esperando respuesta");
  const sVB=strat.filter(t=>["por definir","planificado"].includes(t.status));
  const sDev=strat.filter(t=>["en desarrollo","en gestión"].includes(t.status));
  function stratCard(label,init,av,st){
    const bp={};st.forEach(t=>{const p=getProj(t);bp[p]=(bp[p]||0)+1;});
    const tot=st.length||1;
    return`<div class="card"><div class="phead"><div class="av ${av}">${init}</div><div><div class="pname">${label}</div><div class="prole">Carga estratégica</div></div></div>
    <div class="pstats"><div><div class="psv" style="color:#4a3fa0">${st.length}</div><div class="psl">estratégicas</div></div><div><div class="psv" style="color:#8b1a1a">${st.filter(t=>t.priority==="urgent").length}</div><div class="psl">urgentes</div></div><div><div class="psv">${st.filter(t=>t.status==="en desarrollo").length}</div><div class="psl">en diseño</div></div></div>
    ${Object.entries(bp).sort((a,b)=>b[1]-a[1]).map(([p,n])=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><div style="flex:1;height:4px;background:#c8bfb0;border-radius:2px;overflow:hidden"><div style="width:${Math.round(n/tot*100)}%;height:100%;background:${PROJ_COLORS[p]||'#555'}"></div></div><span style="font-size:9px;color:#1a1410;font-weight:500;width:110px">${PROJ_MAP[p]||p} (${n})</span></div>`).join("")}</div>`;
  }
  let v2p="all";
  const projList=["all",...[...new Set(strat.map(getProj))]];
  function renderV2tasks(){
    document.getElementById("v2f").innerHTML=projList.map(p=>`<button class="fbtn${p===v2p?" active":""}" onclick="v2sp('${p}')">${p==="all"?"Todos":PROJ_MAP[p]||p}</button>`).join("");
    const list=(v2p==="all"?strat:strat.filter(t=>getProj(t)===v2p)).sort((a,b)=>(a.due||9e15)-(b.due||9e15));
    document.getElementById("v2tasks").innerHTML=list.map(t=>{
      const isOv=t.due&&t.due<now;const isBlk=t.status==="esperando respuesta"||t.status==="por definir";
      const dc=t.ass&&t.ass.includes(MARISEL)&&!(t.ass&&t.ass.includes(MARIA))?"#1e1060":"#1a5c3a";
      const proj=getProj(t);
      return`<div class="trow">${sdot(t.status)}<span class="pdot" style="background:${dc}"></span><span class="tname"><a href="https://app.clickup.com/t/${t.id}" target="_blank">${t.name}</a></span><span class="badge" style="background:${PROJ_COLORS[proj]}22;color:${PROJ_COLORS[proj]};font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600">${PROJ_MAP[proj]||proj}</span>${pbadge(t.priority)}${isBlk?`<span class="blk">bloqueada</span>`:""}<span class="${isOv?"due-ov":"due-ok"}">${fmtD(t.due)}${isOv?" ⚠":""}</span></div>`;
    }).join("");
  }
  window.v2sp=p=>{v2p=p;renderV2tasks();};
  const sUrgOv=strat.filter(t=>t.priority==="urgent"&&t.due&&t.due<now);
  document.getElementById("v2").innerHTML=`
  <div class="section"><div class="sec-title">Dashboard Estratégico</div>
    <div class="grid3">${[{l:"Tareas estratégicas activas",v:strat.length,s:"total alta complejidad",c:"#4a3fa0"},{l:"Carga cognitiva Maria",v:sm.length,s:"tareas estratégicas",c:"#0d6e3a"},{l:"Carga cognitiva Marisel",v:ss.length,s:"tareas estratégicas",c:"#1e1060"},{l:"En construcción / diseño",v:sDev.length,s:"en desarrollo activo"},{l:"Esperando VB / validación",v:sVB.length,s:"detenidas por aprobación",c:"#8b3a00"},{l:"Bloqueadas — esperando",v:sBlk.length,s:"dependen de terceros",c:"#8b1a1a"}].map(m=>`<div class="card"><div class="metric-lbl">${m.l}</div><div class="metric-val"${m.c?` style="color:${m.c}"`:""}>${m.v}</div><div class="metric-sub">${m.s}</div></div>`).join("")}</div>
  </div>
  <div class="section"><div class="sec-title">Carga cognitiva por persona</div><div class="grid2">${stratCard("Maria Merino","MM","av-m",sm)}${stratCard("Marisel Echevarría","ME","av-s",ss)}</div></div>
  <div class="section"><div class="sec-title">Tareas estratégicas activas</div><div class="card"><div class="frow" id="v2f"></div><div id="v2tasks"></div></div></div>
  <div class="section"><div class="sec-title">Insights estratégicos</div><div class="ins-list">${[
    {c:"ins-r",t:`<strong>${sUrgOv.length} iniciativas estratégicas urgentes y vencidas</strong> — PDL y Formación Local tienen trabajo crítico sin avance.`},
    {c:"ins-b",t:`<strong>Marisel concentra el ${strat.length>0?Math.round(ss.length/strat.length*100):0}% de la carga estratégica</strong> — PDL, FL y Cable Bolting son sus tres frentes simultáneos.`},
    {c:"ins-y",t:`<strong>${sVB.length} tareas estratégicas bloqueadas por validación</strong> — Sin VB de Pilar o Ayrton, no avanzan.`},
    {c:"ins-g",t:`<strong>CHASKA y Aprendo AESA tienen trabajo estratégico avanzado</strong> — Solo necesitan cierre y validación esta semana.`},
  ].map(i=>`<div class="ins ${i.c}">${i.t}</div>`).join("")}</div></div>`;
  renderV2tasks();
}

function buildV3(tasks){
  const now=Date.now();
  const active=tasks.filter(t=>!CLOSED_ST.includes(t.status));
  const projects=Object.keys(PROJ_MAP);
  const blocked=active.filter(t=>t.status==="esperando respuesta"||t.status==="por definir");
  const activeProjs=projects.filter(p=>active.some(t=>t.tags&&t.tags.some(tg=>tg.toLowerCase()===p)));
  const mostUrgP=projects.reduce((a,p)=>{const n=active.filter(t=>t.tags&&t.tags.some(tg=>tg.toLowerCase()===p)&&t.priority==="urgent").length;return n>a.n?{p,n}:a;},{p:"",n:0});
  const progHtml=projects.map(p=>{
    const pAll=tasks.filter(t=>t.tags&&t.tags.some(tg=>tg.toLowerCase()===p));
    const pCl=pAll.filter(t=>CLOSED_ST.includes(t.status)).length;
    const pAct=pAll.filter(t=>!CLOSED_ST.includes(t.status));
    const pct=pAll.length>0?Math.round(pCl/pAll.length*100):0;
    const urgN=pAct.filter(t=>t.priority==="urgent").length;
    const blkN=pAct.filter(t=>t.status==="esperando respuesta").length;
    const col=PROJ_COLORS[p]||"#555";
    return`<div class="card"><div class="prog-top"><span>${PROJ_MAP[p]}</span><span style="color:${col}">${pct}%</span></div><div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${col}"></div></div><div class="prog-sub">${pCl} cerradas · ${pAct.length} activas · ${pAll.length} total${urgN>0?` · <span style="color:#8b1a1a;font-weight:700">${urgN} urgentes</span>`:""}${blkN>0?` · <span style="color:#8b3a00;font-weight:700">${blkN} bloqueadas</span>`:""}</div></div>`;
  }).join("");
  const tipoHtml=projects.map(p=>{
    const pAct=active.filter(t=>t.tags&&t.tags.some(tg=>tg.toLowerCase()===p));
    if(!pAct.length)return`<div class="card"><div class="prog-top"><span>${PROJ_MAP[p]}</span><span style="color:#8a7d6e">sin activas</span></div></div>`;
    const types={};pAct.forEach(t=>{const tp=getType(t);types[tp]=(types[tp]||0)+1;});
    const tot=pAct.length;
    const bars=Object.entries(types).sort((a,b)=>b[1]-a[1]);
    return`<div class="card"><div class="prog-top"><span>${PROJ_MAP[p]}</span><span style="font-size:10px;color:#5a5048">${tot} activas</span></div><div class="sbar" style="margin-bottom:6px">${bars.map(([tp,n])=>`<div style="width:${Math.round(n/tot*100)}%;background:${TYPE_COLORS[tp]||'#555'}" title="${tp}: ${n}"></div>`).join("")}</div><div style="display:flex;flex-wrap:wrap;gap:5px">${bars.map(([tp,n])=>`<span style="font-size:9px;color:${TYPE_COLORS[tp]||'#3a3028'};font-weight:600">${tp} ${n}</span>`).join("")}</div></div>`;
  }).join("");
  const mostAct=projects.reduce((a,p)=>{const n=active.filter(t=>t.tags&&t.tags.some(tg=>tg.toLowerCase()===p)).length;return n>a.n?{p,n}:a;},{p:"",n:0});
  const mostOp=projects.reduce((a,p)=>{const tsk=active.filter(t=>t.tags&&t.tags.some(tg=>tg.toLowerCase()===p));const n=tsk.filter(t=>["operativo","seguimiento"].includes(getType(t))).length;return n>a.n?{p,n}:a;},{p:"",n:0});
  document.getElementById("v3").innerHTML=`
  <div class="section"><div class="sec-title">Portafolio de Proyectos</div>
    <div class="grid3">${[{l:"Proyectos activos",v:activeProjs.length,s:"con tareas en movimiento"},{l:"Mayor riesgo urgente",v:PROJ_MAP[mostUrgP.p]||"—",s:`${mostUrgP.n} urgentes`,c:"#8b1a1a",sm:true},{l:"Tareas bloqueadas",v:blocked.length,s:"esperando o sin definir",c:"#8b3a00"}].map(m=>`<div class="card"><div class="metric-lbl">${m.l}</div><div class="metric-val" style="font-size:${m.sm?"16px":"22px"};${m.c?`color:${m.c}`:""}">${m.v}</div><div class="metric-sub">${m.s}</div></div>`).join("")}</div>
  </div>
  <div class="section"><div class="sec-title">Avance y composición por proyecto</div><div class="grid2">${progHtml}</div></div>
  <div class="section"><div class="sec-title">Distribución de tipo de trabajo por proyecto</div><div class="grid2">${tipoHtml}</div></div>
  <div class="section"><div class="sec-title">Insights de portafolio</div><div class="ins-list">${[
    {c:"ins-b",t:`<strong>${PROJ_MAP[mostAct.p]||"—"} es el proyecto con más movimiento activo</strong> — Requiere mayor atención de coordinación esta semana.`},
    {c:"ins-r",t:`<strong>${PROJ_MAP[mostUrgP.p]||"—"} concentra el mayor riesgo</strong> con ${mostUrgP.n} tareas urgentes. Si alguna se traba, impacta el kickoff del programa.`},
    {c:"ins-y",t:`<strong>${PROJ_MAP[mostOp.p]||"—"} es donde más tiempo administrativo se está yendo</strong> — Evaluar si algunas tareas se pueden delegar.`},
    {c:"ins-g",t:`<strong>Cable Bolting y Formación Local tienen el mayor porcentaje de trabajo estratégico sin cierre</strong> — Definir prioridad de VB esta semana.`},
  ].map(i=>`<div class="ins ${i.c}">${i.t}</div>`).join("")}</div></div>`;
}

loadData();
</script>
